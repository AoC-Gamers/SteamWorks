name: Build SteamWorks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      sdk_name:
        description: "Steamworks-SDK directory name to use"
        required: true
        default: "sdk_158a"

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout SteamWorks
        uses: actions/checkout@v4

      - name: Checkout Steamworks-SDK
        uses: actions/checkout@v4
        with:
          repository: AoC-Gamers/Steamworks-SDK
          path: steamworks-sdk

      - name: Resolve SDK name
        shell: bash
        run: |
          SDK_NAME="${{ github.event.inputs.sdk_name }}"
          if [[ -z "$SDK_NAME" ]]; then
            SDK_NAME="sdk_158a"
          fi

          echo "SDK_NAME=$SDK_NAME" >> "$GITHUB_ENV"
          echo "STEAMWORKS_SDK_DIR=$GITHUB_WORKSPACE/steamworks-sdk/$SDK_NAME" >> "$GITHUB_ENV"

      - name: Validate SDK path
        shell: bash
        run: |
          if [[ ! -d "$STEAMWORKS_SDK_DIR" ]]; then
            echo "Steamworks SDK directory not found: $STEAMWORKS_SDK_DIR" >&2
            exit 1
          fi

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv make gcc-multilib g++-multilib clang

      - name: Fetch build dependencies
        shell: bash
        run: make deps

      - name: Build extension
        shell: bash
        run: make build-l4d2 STEAMWORKS_SDK_DIR="$STEAMWORKS_SDK_DIR"

      - name: Prepare artifact
        shell: bash
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/steamworks-package"

          mkdir -p "$ARTIFACT_DIR/addons/sourcemod/extensions"
          mkdir -p "$ARTIFACT_DIR/addons/sourcemod/scripting/include"

          cp ".build/linux-l4d2/package/addons/sourcemod/extensions/SteamWorks.ext.so" \
            "$ARTIFACT_DIR/addons/sourcemod/extensions/SteamWorks.ext.so"

          cp "Pawn/includes/SteamWorks.inc" \
            "$ARTIFACT_DIR/addons/sourcemod/scripting/include/SteamWorks.inc"

          find "$ARTIFACT_DIR" -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: steamworks-linux-${{ env.SDK_NAME }}
          path: ${{ runner.temp }}/steamworks-package
          if-no-files-found: error
